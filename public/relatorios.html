<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ipiaú - Detalhamento de Demandas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/relatorios.css">
</head>
<body>

    <header>
        <div class="container header-flex">
            <img src="images/logopmi.png" alt="Logo Ipiaú" class="logo">
            <h1>Relatórios Administrativos</h1>
            <div class="spacer-header"></div>
        </div>
    </header>

    <nav>
        <div class="container nav-flex-center" id="nav-menu">
            <a href="index.html">NOVA DEMANDA</a>
            <a href="historico.html">HISTÓRICO</a>
            <a href="relatorios.html" class="active">RELATÓRIOS</a>
        </div>
    </nav>

    <main class="container" style="margin-top: 30px; padding-bottom: 80px;">
        <div class="section-title">
            <h2><span class="dot"></span> Demandas por Categoria</h2>
        </div>
        <div id="painel-estatisticas" class="report-grid"></div>

        <div class="section-title" style="margin-top: 50px;">
            <h2><span class="dot laranja"></span> Detalhar por Localidade</h2>
        </div>
        <div class="bairro-filter-container">
            <select id="select-bairro-report" onchange="filtrarPorBairro()">
                <option value="">🏠 Selecione um bairro...</option>
            </select>
        </div>
        <div id="resultado-bairro" class="bairro-results-grid">
            <div class="empty-state">Escolha um bairro para detalhar.</div>
        </div>

        <div class="section-title" style="margin-top: 60px;">
            <h2><span class="dot azul"></span> Análise Estatística Geral</h2>
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Distribuição de Problemas</h3>
                <div class="canvas-container-pizza"><canvas id="chart-problemas"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Volume de Demandas por Bairro</h3>
                <div class="canvas-container-barras" id="container-barras-bairro"><canvas id="chart-bairros"></canvas></div>
            </div>
        </div>

        <!-- MODAL LISTA -->
        <div id="modal-overlay" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="header-info"><span id="modal-emoji" class="modal-emoji">📋</span><h2 id="modal-titulo">Categoria</h2></div>
                    <button onclick="fecharModal()" class="btn-fechar-modal">✖</button>
                </div>
                <div id="modal-corpo" class="modal-body"></div>
            </div>
        </div>

        <!-- MODAL FICHA TÉCNICA -->
        <div id="modal-info-demanda" class="modal-overlay" style="display: none; z-index: 1100;">
            <div class="modal-content info-panel">
                <div class="modal-header blue-head">
                    <h2>Ficha Técnica da Ocorrência</h2>
                    <button onclick="fecharInfo()" class="btn-fechar-modal">✖</button>
                </div>
                <div id="info-corpo" class="modal-body"></div>
                <!-- RODAPÉ CORRIGIDO COM ID PARA OS BOTÕES -->
                <div class="modal-footer" id="info-footer-botoes"></div>
            </div>
        </div>

        <div style="display: none;"><div id="documento-a4-oculto" class="folha-a4"></div></div>
    </main>

    <script src="relatorios.js"></script>
</body>
</html>
